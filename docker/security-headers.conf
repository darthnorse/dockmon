# DockMon security headers - shared across all app responses.
#
# nginx add_header does NOT cascade into a location that declares its own
# add_header (e.g. the cache-control blocks for HTML/static assets), so this
# snippet is included both at server level AND inside every location that sets
# its own headers. Change headers here once; all include sites stay in sync.
#
# In reverse-proxy (HTTP) mode a fronting proxy terminates TLS; HSTS still
# reaches the browser over HTTPS via the proxy. If that proxy also sets these
# headers the browser sees duplicates, which is harmless.
#
# style-src/font-src allow Google Fonts (fonts.googleapis.com / fonts.gstatic.com)
# because the SPA loads the Inter webfont from there (see ui/index.html).
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options "SAMEORIGIN" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data:; connect-src 'self'; font-src 'self' data: https://fonts.gstatic.com; object-src 'none'; frame-ancestors 'self'; base-uri 'self'" always;
